name: Build and Deploy Event Service (Blue-Green)

on:
  push:
    branches: [main]
    paths:
      - 'event-service/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./event-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/event-service:${{ github.sha }}

      - name: Deploy to EC2 (blue-green switch)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Determine which slot is currently idle
            CURRENT=$(kubectl get svc event-service -o jsonpath='{.spec.selector.version}')
            if [ "$CURRENT" = "blue" ]; then
              IDLE="green"
            else
              IDLE="blue"
            fi

            # Pull the new image into k3s containerd on the idle slot
            sudo k3s ctr images pull docker.io/${{ secrets.DOCKERHUB_USERNAME }}/event-service:${{ github.sha }}

            # Update the idle deployment with the new image
            kubectl set image deployment/event-service-$IDLE event-service=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/event-service:${{ github.sha }}
            kubectl rollout status deployment/event-service-$IDLE

            # Switch traffic to the now-updated idle slot
            kubectl patch svc event-service -p "{\"spec\":{\"selector\":{\"app\":\"event-service\",\"version\":\"$IDLE\"}}}"

            echo "Switched traffic to $IDLE"
