apiVersion: apps/v1
kind: Deployment
metadata:
  name: program-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: program-service
  template:
    metadata:
      labels:
        app: program-service
    spec:
      containers:
        - name: program-service
          image: docker.io/library/program-service:latest
          imagePullPolicy: Never
          envFrom:
            - secretRef:
                name: db-credentials
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: program-service
spec:
  selector:
    app: program-service
  ports:
    - port: 3000
      targetPort: 3000
